name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      dry_run:
        required: false
        type: boolean
        default: false
      tag_name:
        required: true
        type: string
      target_commitish:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build release artifacts without publishing a GitHub release
        required: false
        type: boolean
        default: false
      tag_name:
        description: Tag to release (e.g. v0.2.0 or v0.2.0-nightly.20260321.1)
        required: true
        type: string
      target_commitish:
        description: Commit-ish to tag (branch or SHA)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

env:
  OPENCOVE_RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  OPENCOVE_RELEASE_TARGET: ${{ inputs.target_commitish || github.sha }}

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            build_command: pnpm build:mac:arm64
            artifact_name: macos-arm64
            upload_updater_metadata: false
          - label: macOS Intel
            runner: macos-15-intel
            build_command: pnpm build:mac:x64
            artifact_name: macos-x64
            upload_updater_metadata: false
          - label: Windows
            runner: windows-latest
            build_command: pnpm build:win
            artifact_name: windows
            upload_updater_metadata: true
          - label: Linux
            runner: ubuntu-latest
            build_command: pnpm build:linux
            artifact_name: linux
            upload_updater_metadata: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.OPENCOVE_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package version with release tag
        run: node scripts/apply-ci-release-version.mjs "${{ env.OPENCOVE_RELEASE_TAG }}"

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.build_command }}

      - name: Build standalone server bundle
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm build:standalone:asset

      - name: Smoke standalone server install (macOS/Linux)
        if: matrix.artifact_name != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="$(find dist -maxdepth 1 -name 'opencove-server-*.tar.gz' -print -quit)"
          test -n "$asset"
          export OPENCOVE_STANDALONE_ASSET="$asset"
          export OPENCOVE_INSTALL_ROOT="$RUNNER_TEMP/opencove-standalone"
          export OPENCOVE_BIN_DIR="$RUNNER_TEMP/opencove-bin"
          sh scripts/release-assets/opencove-install.sh
          "$OPENCOVE_BIN_DIR/opencove" worker start --help
          sh scripts/release-assets/opencove-install.sh --uninstall

      - name: Smoke standalone server install (Windows)
        if: matrix.artifact_name == 'windows'
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist -Filter 'opencove-server-*.zip' | Select-Object -First 1
          if ($null -eq $asset) {
            throw 'Standalone Windows asset was not produced.'
          }
          $env:OPENCOVE_STANDALONE_ASSET = $asset.FullName
          $env:OPENCOVE_INSTALL_ROOT = Join-Path $env:RUNNER_TEMP 'opencove-standalone'
          $env:OPENCOVE_BIN_DIR = Join-Path $env:RUNNER_TEMP 'opencove-bin'
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/release-assets/opencove-install.ps1
          & (Join-Path $env:OPENCOVE_BIN_DIR 'opencove.cmd') worker start --help
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/release-assets/opencove-install.ps1 -Uninstall

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            !dist/opencove-server-*.tar.gz
            !dist/opencove-server-*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload updater metadata
        if: ${{ matrix.upload_updater_metadata }}
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.artifact_name }}-updater-metadata
          path: |
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 7

      - name: Upload standalone server bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.artifact_name }}-standalone
          path: |
            dist/opencove-server-*.tar.gz
            dist/opencove-server-*.zip
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}

    steps:
      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          if [[ "${OPENCOVE_RELEASE_TAG}" == *"-nightly."* ]]; then
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Nightly ${OPENCOVE_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${OPENCOVE_RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.OPENCOVE_RELEASE_TARGET }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Align package version with release tag
        run: node scripts/apply-ci-release-version.mjs "${{ env.OPENCOVE_RELEASE_TAG }}"

      - name: Generate release manifest
        run: node scripts/generate-release-manifest.mjs

      - name: Generate checksums
        run: |
          node scripts/generate-release-installer-assets.mjs release-assets
          node scripts/generate-checksums.mjs release-assets

      - name: Publish nightly prerelease
        if: steps.channel.outputs.is_nightly == 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.OPENCOVE_RELEASE_TAG }}
          target_commitish: ${{ env.OPENCOVE_RELEASE_TARGET }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release-assets/*
            release/release-manifest.json

      - name: Publish stable release
        if: steps.channel.outputs.is_nightly != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.OPENCOVE_RELEASE_TAG }}
          target_commitish: ${{ env.OPENCOVE_RELEASE_TARGET }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/*
            release/release-manifest.json
